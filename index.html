<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Fluxly</title>
    <meta name="description" content="Controle seu fluxo financeiro de forma simples e inteligente." />

    <link rel="icon" type="image/png" href="/Fluxly-light.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" href="/Fluxly-dark.png" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="/Fluxly.png" />
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />

    <meta name="theme-color" content="#0F172B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Fluxly" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      const metaThemeColor = document.querySelector("meta[name='theme-color']");
      const matcher = window.matchMedia('(prefers-color-scheme: dark)');

      function updateTheme() {
        metaThemeColor.setAttribute("content", matcher.matches ? "#000000" : "#0F172B");
      }

      if (metaThemeColor) {
        matcher.addEventListener('change', updateTheme);
        updateTheme();
      }
    </script>
  </body>
</html>
